name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install setuptools (fix distutils for node-gyp)
        run: pip install setuptools
      - run: npm install
      - run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
      - name: Fix latest.yml filename (spaces -> dots)
        shell: pwsh
        run: |
          $yml = Get-Content dist/latest.yml -Raw
          $yml = $yml -replace 'Split-Terminal-Setup-', 'Split.Terminal.Setup.'
          $yml = $yml -replace 'Split Terminal Setup ', 'Split.Terminal.Setup.'
          Set-Content dist/latest.yml $yml
      - uses: actions/upload-artifact@v4
        with:
          name: windows-dist
          path: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/latest.yml

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install setuptools (fix distutils for node-gyp)
        run: pip3 install setuptools --break-system-packages
      - run: npm install
      - run: npm run dist:mac:x64
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
      - run: npm run dist:mac:arm64
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: mac-dist
          path: |
            dist/*.dmg
            dist/*.dmg.blockmap
            dist/latest-mac.yml

  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GH_TOKEN }}
      - uses: actions/download-artifact@v4
        with:
          name: windows-dist
          path: dist-win
      - uses: actions/download-artifact@v4
        with:
          name: mac-dist
          path: dist-mac
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-win/*.exe
            dist-win/*.exe.blockmap
            dist-win/latest.yml
            dist-mac/*.dmg
            dist-mac/*.dmg.blockmap
            dist-mac/latest-mac.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
      - name: Update README download links
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s|/download/v[0-9.]\+/|/download/v${VERSION}/|g" README.md
          sed -i "s|Split\.Terminal\.Setup\.[0-9.]\+\.exe|Split.Terminal.Setup.${VERSION}.exe|g" README.md
          sed -i "s|Split\.Terminal-[0-9.]\+\.dmg|Split.Terminal-${VERSION}.dmg|g" README.md
          sed -i "s|Split\.Terminal-[0-9.]\+-arm64\.dmg|Split.Terminal-${VERSION}-arm64.dmg|g" README.md
      - name: Commit and push README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "docs: update download links to v${GITHUB_REF_NAME#v}"
          git push
